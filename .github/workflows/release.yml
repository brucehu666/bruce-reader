name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          pip install pyinstaller pywin32 pyqt5 chardet

      - name: Build executable
        run: |
          pyinstaller main.py --name=PCReader --windowed --onefile --icon=NONE `
            --add-data=config.py;. `
            --add-data=file_processor.py;. `
            --add-data=settings_manager.py;. `
            --add-data=bookmark_manager.py;. `
            --add-data=tts_engine.py;. `
            --add-data=main_window.py;. `
            --add-data=document_reader.py;. `
            --hidden-import=PyQt5 `
            --hidden-import=pywin32 `
            --hidden-import=chardet `
            --clean --noconfirm

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PCReader.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
